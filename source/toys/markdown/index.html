<!doctype html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Markdown Preview</title>
  <script :version="2.1.1" src="/toy/veps.js"></script>
  <link
    rel="stylesheet"
    href="https://registry.npmmirror.com/github-markdown-css/5.9.0/files/github-markdown-light.css"
  />
  <script src="https://registry.npmmirror.com/marked/14.1.4/files/marked.min.js"></script>
</head>

<style>
  #\$in {
    box-sizing: border-box;
    width: 100%;
    height: 60vh;
    padding: 5px;
    margin: 8px 0;
    font-family: monospace;
    resize: vertical;
    border: 1px solid #777;
  }
</style>

<body>
  <button id="$save">Save</button>
  <button id="$fmt">Format</button>
  <textarea id="$in" placeholder="Markdown input" spellcheck="false"></textarea>
  <div id="$out" class="markdown-body" style="min-height: 100vh"></div>
</body>

<script>
  $in.oninput = () => void ($out.innerHTML = marked.parse($in.value));
  $in.oninput();
  $save.onclick = () => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([$in.value]));
    a.download = Date.now() + ".md";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 900);
  };
  $fmt.onclick = async () => {
    if (!window.prettier) {
      $fmt.disabled = true;
      await import("https://registry.npmmirror.com/prettier/2.8.8/files/standalone.js"); // because prettier 3.0 removed paranoid text spacing
      await import("https://registry.npmmirror.com/prettier/2.8.8/files/parser-markdown.js");
      $fmt.disabled = false;
    }
    const options = { parser: "markdown", plugins: prettierPlugins };
    $in.value = prettier.format($in.value, options);
    $in.oninput();
  };
</script>
